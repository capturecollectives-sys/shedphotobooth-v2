<svg viewBox="240 85 320 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;800&amp;display=swap');
      .st { fill: none; stroke: #FFFFFF; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .st-thin { fill: none; stroke: #FFFFFF; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .text-shed { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 140px; fill: #FFFFFF; }
      .text-pb { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 42px; fill: #FFB800; letter-spacing: 22px; }
      .text-tag { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 20px; fill: rgba(255,255,255,0.55); }
    </style>
  </defs>
  <!-- Roof -->
  <polyline class="st" points="255,210 400,105 545,210" />
  <!-- Left wall -->
  <polyline class="st" points="275,198 275,295" />
  <!-- Right wall -->
  <polyline class="st" points="525,198 525,295" />
  <!-- Camera lens -->
  <circle class="st-thin" cx="400" cy="225" r="48" />
  <circle class="st-thin" cx="400" cy="225" r="22" />
  <!-- Lens pole -->
  <line class="st-thin" x1="400" y1="273" x2="400" y2="340" />
  <line class="st-thin" x1="375" y1="340" x2="425" y2="340" />
  <!-- Text -->
  <text x="400" y="455" class="text-shed" text-anchor="middle">SHED</text>
  <text x="410" y="518" class="text-pb" text-anchor="middle">PHOTOBOOTH</text>
  <text x="400" y="562" class="text-tag" text-anchor="middle">Custom Installations for Immersive Events</text>
</svg>